 <meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  body { background-color: #0a0a0a; color: #ffffff; overflow: hidden; }

  #feed {
    height: 100vh;
    width: 100vw;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

  .card {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
    position: relative;
  }

  /* COMPTEUR & BADGE */
  .header-badges {
    position: absolute;
    top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .counter-badge {
    background: #ffffff;
    color: #000000;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 900;
  }
  .theme-badge {
    background: rgba(0, 0, 0, 0.5);
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .emoji-big { font-size: 5rem; margin-bottom: 15px; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5)); margin-top: 60px; }
  .title { font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; line-height: 1.1; }
  .rule { font-size: 1.1rem; line-height: 1.4; max-width: 95%; margin-bottom: 20px; font-weight: 500; }
  
  .reveal-btn {
    background: rgba(255, 255, 255, 0.15);
    border: 2px solid #fff;
    color: #fff;
    padding: 14px 28px;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .reveal-btn:active { transform: scale(0.95); background: #fff; color: #000; }

  .secret-info {
    display: none;
    margin-top: 15px;
    padding: 20px;
    background: #ffffff;
    color: #000000;
    border-radius: 15px;
    font-weight: 700;
    font-size: 1rem;
    max-width: 95%;
    max-height: 35vh;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes pop {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .scroll-hint {
    position: absolute;
    bottom: 15px;
    font-size: 0.8rem;
    opacity: 0.6;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
  }
  .math-highlight { color: #ffeb3b; font-weight: 900; }
  .alert-highlight { color: #ff3b3b; font-weight: 900; }
</style>
</head>

  // 🔀 LA FONCTION MAGIQUE DE MÉLANGE (Algorithme de Fisher-Yates) 🔀
  function melanger(array) {
    let currentIndex = array.length, randomIndex;
    // Tant qu'il reste des éléments à mélanger...
    while (currentIndex !== 0) {
      // Choisir un élément restant au hasard
      randomIndex = Math.floor(Math.random() * currentIndex);
      currentIndex--;
      // Échanger cet élément avec l'élément actuel
      [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
  }

  // On mélange le gros tableau des 60 fiches avant de l'afficher
  const fichesAleatoires = melanger(fiches);
  const feed = document.getElementById('feed');

  // Génération des cartes HTML avec le tableau mélangé
  fichesAleatoires.forEach((fiche, index) => {
    const section = document.createElement('section');
    section.className = 'card';
    section.style.background = fiche.couleur;

    section.innerHTML = `
      <div class="header-badges">
        <div class="counter-badge">Fiche ${index + 1} / ${fichesAleatoires.length}</div>
        <div class="theme-badge">${fiche.theme}</div>
      </div>
      <div class="emoji-big">${fiche.emoji}</div>
      <h1 class="title">${fiche.titre}</h1>
      <p class="rule">${fiche.regle}</p>
      
      <button class="reveal-btn" onclick="revelerPiege(this)">⚠️ Découvrir le piège</button>
      <div class="secret-info">${fiche.piege}</div>
      
      <div class="scroll-hint">Scrolle pour la suite 👇</div>
    `;

    feed.appendChild(section);
  });

  // Action du bouton
  function revelerPiege(bouton) {
    const secret = bouton.nextElementSibling;
    if (secret.style.display === "block") {
      secret.style.display = "none";
      bouton.innerText = "⚠️ Découvrir le piège";
    } else {
      secret.style.display = "block";
      bouton.style.display = "none";
    }
  }
</script>
